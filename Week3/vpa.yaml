apiVersion: v1
kind: Namespace
metadata:
  name: vpa-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpa-sample-app
  namespace: vpa-demo
  labels:
    app: vpa-sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vpa-sample-app
  template:
    metadata:
      labels:
        app: vpa-sample-app
    spec:
      containers:
        - name: app
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 2m
              memory: 16Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: vpa-sample-app
  namespace: vpa-demo
spec:
  selector:
    app: vpa-sample-app
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-sample-app
  namespace: vpa-demo
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: vpa-sample-app
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        controlledResources: ["cpu", "memory"]
        minAllowed:
          cpu: 2m
          memory: 16Mi
        maxAllowed:
          cpu: 1
          memory: 1Gi